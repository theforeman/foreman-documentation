# Report procedures that contain more than 10 steps.
---
extends: script
message: "Procedure contains more than 10 steps. Consider splitting into multiple procedures."
level: error
scope: raw
script: |
  text := import("text")
  matches := []
  lines := text.split(scope, "\n")
  count := 0
  step_positions := []
  position := 0

  for line in lines {
    if text.re_match("^\\. [^\\.]", line) {
      count += 1
      step_positions = append(step_positions, position)
    }
    position += len(line) + 1
  }

  if count > 10 {
    // Report error on ALL steps to ensure it appears in GitHub Actions diff context
    // when ANY step is modified in a procedure that exceeds the 10-step limit
    for i := 0; i < count; i++ {
      step_pos := step_positions[i]
      matches = append(matches, {begin: step_pos, end: step_pos + 1})
    }
  }

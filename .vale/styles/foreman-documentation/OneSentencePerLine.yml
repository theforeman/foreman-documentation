---
extends: existence
message: "Write one sentence per line."
level: error
scope: raw
nonword: true
tokens:
  # Match: word/)/]/quote + sentence-end punctuation + space/tab + capital letter/[
  # Using [ \t] instead of \s to match only horizontal whitespace, not newlines
  - '[a-z0-9\)\]"][.!?][ \t]+[A-Z\[]'

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contributors' Guide - Foreman Documentation</title>
  <style>
    :root {
      --primary-color: #ba3925;
      --text-color: rgba(0, 0, 0, 0.8);
      --bg-color: #ffffff;
      --sidebar-bg: #f8f8f7;
      --border-color: #dddddf;
      --code-bg: #f7f7f8;
      --link-color: #2156a5;
      --heading-color: #ba3925;
      --nav-bg: #025d8c;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Noto Serif", "DejaVu Serif", serif;
      line-height: 1.6;
      color: var(--text-color);
      background: var(--bg-color);
    }

    .container {
      display: flex;
      min-height: 100vh;
    }

    /* Sidebar with TOC */
    .sidebar {
      width: 280px;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border-color);
      padding: 2rem 1.5rem;
      position: fixed;
      height: 100vh;
      overflow-y: auto;
      top: 0;
      left: 0;
    }

    .sidebar h2 {
      font-size: 1.1rem;
      color: var(--heading-color);
      margin-bottom: 1rem;
      font-weight: 600;
    }

    .toc {
      list-style: none;
    }

    .toc li {
      margin: 0.3rem 0;
    }

    .toc a {
      color: var(--text-color);
      text-decoration: none;
      font-size: 0.9rem;
      display: block;
      padding: 0.25rem 0;
      transition: color 0.2s;
    }

    .toc a:hover {
      color: var(--link-color);
    }

    .toc-level-1 {
      font-weight: 600;
      margin-top: 0.8rem;
    }

    .toc-level-2 {
      padding-left: 1rem;
      font-size: 0.85rem;
    }

    .toc-level-3 {
      padding-left: 2rem;
      font-size: 0.8rem;
      color: #666;
    }

    /* Main content */
    .content {
      margin-left: 280px;
      padding: 3rem;
      max-width: 900px;
      flex: 1;
    }

    /* Typography */
    h1, h2, h3, h4, h5, h6 {
      font-family: "Open Sans", "DejaVu Sans", sans-serif;
      color: var(--heading-color);
      margin: 2rem 0 1rem 0;
      font-weight: 300;
      line-height: 1.25;
      text-rendering: optimizeLegibility;
    }

    h1 {
      font-size: 2.5rem;
      border-bottom: 2px solid var(--border-color);
      padding-bottom: 0.5rem;
      margin-top: 0;
    }

    h2 {
      font-size: 2rem;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 0.3rem;
      margin-top: 3rem;
    }

    h3 {
      font-size: 1.5rem;
    }

    h4 {
      font-size: 1.25rem;
    }

    p {
      margin: 1rem 0;
    }

    a {
      color: var(--link-color);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    /* Lists */
    ul, ol {
      margin: 1rem 0;
      padding-left: 2rem;
    }

    li {
      margin: 0.5rem 0;
    }

    /* Code */
    code {
      background: var(--code-bg);
      padding: 0.2rem 0.4rem;
      border-radius: 3px;
      font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
      font-size: 0.9em;
    }

    pre {
      background: var(--code-bg);
      border: 1px solid var(--border-color);
      border-radius: 6px;
      padding: 1rem;
      overflow-x: auto;
      margin: 1rem 0;
    }

    pre code {
      background: none;
      padding: 0;
      font-size: 0.85rem;
      line-height: 1.5;
    }

    /* Tables */
    table {
      border-collapse: collapse;
      width: 100%;
      margin: 1.5rem 0;
    }

    th, td {
      border: 1px solid var(--border-color);
      padding: 0.75rem;
      text-align: left;
    }

    th {
      background: var(--sidebar-bg);
      font-weight: 600;
    }

    /* Blockquotes */
    blockquote {
      border-left: 4px solid var(--border-color);
      padding-left: 1rem;
      margin: 1rem 0;
      color: #666;
      font-style: italic;
    }

    /* Horizontal rule */
    hr {
      border: none;
      border-top: 2px solid var(--border-color);
      margin: 3rem 0;
    }

    /* Checkboxes */
    input[type="checkbox"] {
      margin-right: 0.5rem;
    }

    /* Footer */
    .footer {
      margin-top: 4rem;
      padding-top: 2rem;
      border-top: 1px solid var(--border-color);
      color: #666;
      font-size: 0.9rem;
    }

    .footer a {
      color: #666;
    }

    /* Syntax highlighting (Rouge default style) */
    .highlight {
      background: var(--code-bg);
    }

    .highlight .c { color: #6a737d; } /* Comment */
    .highlight .k { color: #d73a49; } /* Keyword */
    .highlight .s { color: #032f62; } /* String */
    .highlight .n { color: #24292e; } /* Name */
    .highlight .o { color: #d73a49; } /* Operator */
    .highlight .p { color: #24292e; } /* Punctuation */
    .highlight .m { color: #005cc5; } /* Number */
    .highlight .na { color: #005cc5; } /* Attribute name */
    .highlight .nv { color: #e36209; } /* Variable */

    /* Responsive design */
    @media (max-width: 1024px) {
      .sidebar {
        width: 240px;
      }
      .content {
        margin-left: 240px;
      }
    }

    @media (max-width: 768px) {
      .sidebar {
        position: relative;
        width: 100%;
        height: auto;
        border-right: none;
        border-bottom: 1px solid var(--border-color);
      }
      .content {
        margin-left: 0;
        padding: 1.5rem;
      }
      h1 {
        font-size: 2rem;
      }
      h2 {
        font-size: 1.5rem;
      }
    }

    /* Print styles */
    @media print {
      .sidebar {
        display: none;
      }
      .content {
        margin-left: 0;
        max-width: 100%;
      }
    }
    /* Navigation bar */
    nav {
      position: fixed;
      z-index: 9999;
      left: 0;
      right: 0;
      top: 0;
      height: 70px;
      padding: 0 1.5em;
      background-color: var(--nav-bg);
      font-family: sans-serif;
      line-height: 70px;
    }

    nav .logo {
      width: 50px;
      vertical-align: middle;
    }

    nav .nav-menu {
      position: absolute;
      right: 0.3em;
      top: 0;
      padding: 0;
      margin: 0;
      list-style: none;
    }

    nav .nav-item {
      display: inline-block;
    }

    nav .nav-item > a {
      display: inline-block;
      padding: 0 2.5em;
      line-height: 70px;
      color: #fff;
      text-decoration: none;
    }

    nav .nav-item > a:hover {
      text-decoration: underline;
      color: #fff;
    }

    /* Adjust body for fixed nav */
    body {
      margin-top: 70px;
    }

    /* Adjust sidebar for nav bar */
    .sidebar {
      top: 70px;
      height: calc(100vh - 70px);
    }

    @media (max-width: 768px) {
      nav .nav-menu {
        display: none;
      }
    }
  </style>
</head>
<body>
  <nav>
    <a href="/">
      <img class="logo" src="/img/helmet.svg" alt="Foreman Documentation">
    </a>
    <ul class="nav-menu">
      <li class="nav-item"><a href="https://theforeman.org/">About Foreman</a></li>
      <li class="nav-item"><a href="https://community.theforeman.org/c/support/10">Support forum</a></li>
      <li class="nav-item"><a href="https://github.com/theforeman/foreman-documentation">Contribute</a></li>
      <li class="nav-item"><a href="/release/nightly/">Guides</a></li>
    </ul>
  </nav>
  <div class="container">
    <aside class="sidebar">
      <h2>Table of Contents</h2>
      <ul class="toc">
        {{TOC}}
      </ul>
    </aside>

    <main class="content">
      {{CONTENT}}

      <footer class="footer">
        <p>
          <strong>Foreman Documentation</strong><br>
          Built on {{BUILD_DATE}}<br>
          <a href="https://github.com/theforeman/foreman-documentation" target="_blank">GitHub Repository</a>
        </p>
      </footer>
    </main>
  </div>
</body>
</html>
